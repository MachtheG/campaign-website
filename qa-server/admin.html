<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Maureen's Campaign Q&A</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #c9a03d;
            border-bottom: 2px solid #c9a03d;
            padding-bottom: 10px;
        }
        .question {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #c9a03d;
        }
        .question.answered {
            border-left-color: #27ae60;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #666;
        }
        .question-name {
            font-weight: bold;
            color: #c9a03d;
        }
        .question-text {
            font-size: 1.1rem;
            margin: 10px 0;
            line-height: 1.5;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
        }
        .answer-area {
            margin-top: 15px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #c9a03d;
            outline: none;
        }
        button {
            background: #c9a03d;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            margin-right: 8px;
            font-weight: bold;
            font-size: 1rem;
        }
        button:hover {
            background: #b88b2a;
        }
        .cancel-btn {
            background: #95a5a6;
        }
        .cancel-btn:hover {
            background: #7f8c8d;
        }
        .answer {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 3px solid #27ae60;
        }
        .status-bar {
            background: #2c3e50;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-stats {
            display: flex;
            gap: 20px;
        }
        .stat {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
        }
        .refresh-btn {
            background: #3498db;
        }
        .refresh-btn:hover {
            background: #2980b9;
        }
        .auto-refresh-indicator {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .typing-indicator {
            font-size: 0.75rem;
            color: #c9a03d;
            margin-top: 5px;
        }
        .no-questions {
            text-align: center;
            padding: 60px;
            color: #999;
            background: white;
            border-radius: 12px;
        }
        .draft-saved {
            color: #27ae60;
            font-size: 0.75rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>🗳️ Maureen's Campaign - Q&A Admin Panel</h1>
    
    <div class="status-bar">
        <div class="status-stats" id="stats">
            <span class="stat">Loading...</span>
        </div>
        <div class="auto-refresh-indicator">
            <span id="refreshStatus">Auto-refresh: ON (every 30s)</span>
            <button class="refresh-btn" onclick="toggleAutoRefresh()" style="margin-left: 10px; padding: 5px 12px; font-size: 0.85rem;">⏸️ Pause</button>
        </div>
    </div>
    
    <div id="questions"></div>

    <script>
        const API_URL = window.location.origin + '/api';
        let autoRefresh = true;
        let refreshInterval = null;
        let draftAnswers = {};  // Store draft answers
        let isSubmitting = false;
        
        // Save draft when typing
        function saveDraft(questionId, value) {
            draftAnswers[questionId] = value;
            const indicator = document.getElementById(`draft-indicator-${questionId}`);
            if (indicator) {
                indicator.textContent = '💾 Draft saved';
                setTimeout(() => {
                    if (indicator) indicator.textContent = '';
                }, 1500);
            }
        }
        
        async function loadQuestions(keepDrafts = true) {
            try {
                const response = await fetch(API_URL + '/questions');
                const data = await response.json();
                
                const total = data.total;
                const answered = data.questions.filter(q => q.answered).length;
                const pending = total - answered;
                
                document.getElementById('stats').innerHTML = `
                    <span class="stat">📊 Total: ${total}</span>
                    <span class="stat">✅ Answered: ${answered}</span>
                    <span class="stat">⏳ Pending: ${pending}</span>
                `;
                
                const container = document.getElementById('questions');
                if (data.questions.length === 0) {
                    container.innerHTML = '<div class="no-questions">✨ No questions yet. When residents ask questions, they will appear here.</div>';
                    return;
                }
                
                // Store current textarea values before rebuild
                const currentValues = {};
                if (keepDrafts) {
                    document.querySelectorAll('textarea[id^="answer-"]').forEach(textarea => {
                        const id = textarea.id.replace('answer-', '');
                        currentValues[id] = textarea.value;
                    });
                }
                
                // Build the HTML
                container.innerHTML = data.questions.map(q => `
                    <div class="question ${q.answered ? 'answered' : ''}" data-question-id="${q.id}">
                        <div class="question-header">
                            <span class="question-name">👤 ${escapeHtml(q.name)}</span>
                            <span>📅 ${new Date(q.timestamp).toLocaleString()}</span>
                        </div>
                        <div class="question-text">
                            <strong>❓ Question:</strong><br>
                            ${escapeHtml(q.question)}
                        </div>
                        ${!q.answered ? `
                            <div class="answer-area">
                                <textarea id="answer-${q.id}" 
                                    rows="5" 
                                    placeholder="✍️ Type your response as Maureen here..."
                                    oninput="saveDraft(${q.id}, this.value)">${escapeHtml(draftAnswers[q.id] || currentValues[q.id] || '')}</textarea>
                                <div class="typing-indicator">
                                    <span id="draft-indicator-${q.id}"></span>
                                </div>
                                <div>
                                    <button onclick="submitAnswer(${q.id})">✍️ Post Response</button>
                                    ${draftAnswers[q.id] ? `<button onclick="clearDraft(${q.id})" class="cancel-btn">🗑️ Clear Draft</button>` : ''}
                                </div>
                            </div>
                        ` : `
                            <div class="answer">
                                <strong>✅ Maureen's Response:</strong><br>
                                ${escapeHtml(q.answer)}
                                <div style="font-size: 12px; margin-top: 8px; color: #666;">
                                    📅 Answered: ${new Date(q.answerTimestamp).toLocaleString()}
                                </div>
                            </div>
                        `}
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('stats').innerHTML = '<span class="stat">❌ Connection error</span>';
                document.getElementById('questions').innerHTML = '<div class="no-questions">⚠️ Cannot connect to server. Make sure the Q&A server is running.</div>';
            }
        }
        
        async function submitAnswer(id) {
            const textarea = document.getElementById(`answer-${id}`);
            const answer = textarea ? textarea.value.trim() : '';
            
            if (!answer) {
                alert('Please enter a response before posting.');
                return;
            }
            
            if (isSubmitting) {
                alert('Please wait, already submitting...');
                return;
            }
            
            isSubmitting = true;
            const submitBtn = event?.target;
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = '⏳ Posting...';
            }
            
            try {
                const response = await fetch(API_URL + `/questions/${id}/answer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ answer: answer })
                });
                
                if (response.ok) {
                    alert('✓ Response posted successfully!');
                    // Clear draft for this question
                    delete draftAnswers[id];
                    // Reload questions to show the answered state
                    await loadQuestions(true);
                } else {
                    alert('❌ Error posting response. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error connecting to server. Check your connection.');
            } finally {
                isSubmitting = false;
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '✍️ Post Response';
                }
            }
        }
        
        function clearDraft(id) {
            if (confirm('Clear this draft answer? It will be permanently deleted.')) {
                delete draftAnswers[id];
                const textarea = document.getElementById(`answer-${id}`);
                if (textarea) {
                    textarea.value = '';
                }
                const indicator = document.getElementById(`draft-indicator-${id}`);
                if (indicator) {
                    indicator.textContent = '🗑️ Draft cleared';
                    setTimeout(() => {
                        if (indicator) indicator.textContent = '';
                    }, 1500);
                }
            }
        }
        
        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            const btn = document.querySelector('.refresh-btn');
            const statusSpan = document.getElementById('refreshStatus');
            
            if (autoRefresh) {
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(() => loadQuestions(true), 30000);
                statusSpan.textContent = 'Auto-refresh: ON (every 30s)';
                btn.textContent = '⏸️ Pause';
                btn.style.background = '#3498db';
            } else {
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                    refreshInterval = null;
                }
                statusSpan.textContent = 'Auto-refresh: PAUSED';
                btn.textContent = '▶️ Start';
                btn.style.background = '#27ae60';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Manual refresh button
        window.refreshNow = function() {
            loadQuestions(true);
        };
        
        // Add manual refresh button to status bar
        const refreshBtn = document.createElement('button');
        refreshBtn.textContent = '🔄 Refresh Now';
        refreshBtn.onclick = () => loadQuestions(true);
        refreshBtn.style.background = '#27ae60';
        refreshBtn.style.marginLeft = '10px';
        refreshBtn.style.padding = '5px 12px';
        refreshBtn.style.fontSize = '0.85rem';
        document.querySelector('.status-bar').appendChild(refreshBtn);
        
        // Initial load
        loadQuestions(true);
        
        // Set up auto-refresh (30 seconds instead of 10 to avoid interrupting typing)
        refreshInterval = setInterval(() => {
            if (autoRefresh) {
                loadQuestions(true);
            }
        }, 30000);
        
        // Save drafts before page unload
        window.addEventListener('beforeunload', () => {
            if (Object.keys(draftAnswers).length > 0) {
                localStorage.setItem('maureen_admin_drafts', JSON.stringify(draftAnswers));
            }
        });
        
        // Load saved drafts from localStorage
        const savedDrafts = localStorage.getItem('maureen_admin_drafts');
        if (savedDrafts) {
            try {
                const parsed = JSON.parse(savedDrafts);
                Object.assign(draftAnswers, parsed);
            } catch(e) {}
        }
    </script>
</body>
</html>
